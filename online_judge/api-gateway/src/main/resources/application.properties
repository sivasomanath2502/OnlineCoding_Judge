server.port=8090
spring.application.name=api-gateway

# Submission Service
spring.cloud.gateway.routes[0].id=submission-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/submissions/**

# Result Service
spring.cloud.gateway.routes[1].id=result-service
spring.cloud.gateway.routes[1].uri=http://localhost:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/results/**

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

management.endpoints.web.exposure.include=health,info