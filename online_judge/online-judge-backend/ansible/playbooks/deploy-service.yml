---
- name: Deploy single service
  hosts: app_servers
  become: yes

  vars:
    dockerhub_username: "sivasomanath2502"
    image_tag: "latest"
    service_name: ""
    app_dir: "/opt/online-judge"
    service_ports:
      submission-service:    8081
      worker-service:        8082
      result-service:        8083
      api-gateway:           8090
      admin-service:         8084
      online-judge-frontend: 3000

  tasks:

    - name: Validate service_name
      fail:
        msg: "service_name must be provided via -e service_name=<name>"
      when: service_name == ""

    - name: Pull latest image for {{ service_name }}
      community.docker.docker_image:
        name: "{{ dockerhub_username }}/{{ service_name }}"
        tag: "{{ image_tag }}"
        source: pull
        force_source: yes

    - name: Restart {{ service_name }} via docker-compose (no dependency restart)
      shell: |
        docker-compose -f docker-compose.prod.yml up -d --no-deps {{ service_name }}
      args:
        chdir: "{{ app_dir }}"
      environment:
        IMAGE_TAG: "{{ image_tag }}"
        DOCKERHUB_USERNAME: "{{ dockerhub_username }}"

    # ── Backend services need DB/RabbitMQ connection warm-up time ──
    - name: Wait for {{ service_name }} JVM and DB pool to initialise
      pause:
        seconds: 25
      when: service_name != 'online-judge-frontend'

    # ── nginx needs a moment to bind the port ──
    - name: Wait for frontend nginx to start
      pause:
        seconds: 10
      when: service_name == 'online-judge-frontend'

    # ── Backend health check — waits until Spring Boot reports UP ──
    - name: Wait for {{ service_name }} to be healthy
      uri:
        url: "http://localhost:{{ service_ports[service_name] }}/actuator/health"
        timeout: 10
        status_code: [200, 503]
      register: health
      retries: 20
      delay: 5
      until: >
        health.status == 200 and
        health.json is defined and
        health.json.status == 'UP'
      when: service_name != 'online-judge-frontend'

    # ── Frontend health check ──
    - name: Wait for frontend to respond
      uri:
        url: "http://localhost:3000"
        timeout: 10
      register: fe_health
      retries: 15
      delay: 5
      until: fe_health.status == 200
      when: service_name == 'online-judge-frontend'

    - name: Done
      debug:
        msg: "✅ {{ service_name }} is healthy and running :{{ image_tag }}"