---
- name: Deploy single service
  hosts: app_servers
  become: yes

  vars:
    dockerhub_username: "sivasomanath2502"
    image_tag: "latest"
    service_name: ""

    service_ports:
      submission-service: 8081
      worker-service:     8082
      result-service:     8083
      api-gateway:        8090
      admin-service:      8084
      online-judge-frontend: 3000

    db_services:
      - submission-service
      - result-service
      - admin-service

  tasks:

    - name: Validate service_name is provided
      fail:
        msg: "service_name must be provided"
      when: service_name == ""

    - name: Pull latest image for {{ service_name }}
      community.docker.docker_image:
        name: "{{ dockerhub_username }}/{{ service_name }}"
        tag: "{{ image_tag }}"
        source: pull
        force_source: yes

    - name: Restart container for {{ service_name }}
      community.docker.docker_container:
        name: "{{ service_name }}"
        image: "{{ dockerhub_username }}/{{ service_name }}:{{ image_tag }}"
        state: started
        restart: yes

        ports:
          - "{{ service_ports[service_name] }}:{{ service_ports[service_name] }}"

        networks:
          - name: online-judge-network

        env: >-
          {{
            {
              'SPRING_PROFILES_ACTIVE': 'docker'
            }
            |
            combine(
              (service_name in db_services)
              | ternary(
                  {
                    'SPRING_DATASOURCE_URL': 'jdbc:mysql://mysql:3306/onlinejudge',
                    'SPRING_DATASOURCE_USERNAME': 'root',
                    'SPRING_DATASOURCE_PASSWORD': 'root'
                  },
                  {}
              )
            )
          }}

    - name: Wait for backend service to be healthy
      uri:
        url: "http://localhost:{{ service_ports[service_name] }}/actuator/health"
        status_code: 200
        timeout: 60
      when: service_name != "online-judge-frontend"

    - name: Wait for frontend to be healthy
      uri:
        url: "http://localhost:{{ service_ports[service_name] }}"
        status_code: 200
        timeout: 60
      when: service_name == "online-judge-frontend"

    - name: Service {{ service_name }} is running
      debug:
        msg: "✅ {{ service_name }}:{{ image_tag }} is healthy"