---
- name: Deploy single service (with orchestration)
  hosts: app_servers
  become: yes

  vars:
    dockerhub_username: "sivasomanath2502"
    image_tag: "latest"
    service_name: ""

    service_ports:
      submission-service: 8081
      worker-service:     8082
      result-service:     8083
      api-gateway:        8090
      admin-service:      8084
      online-judge-frontend: 3000

    db_services:
      - submission-service
      - result-service
      - admin-service

  tasks:

    - name: Validate service_name
      fail:
        msg: "service_name must be provided"
      when: service_name == ""

    - name: Ensure Docker network exists
      community.docker.docker_network:
        name: online-judge-network
        state: present

    # ---------------- INFRA ----------------

    - name: Start MySQL
      community.docker.docker_container:
        name: mysql
        image: mysql:8.0
        state: started
        restart_policy: always
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: online_judge
        ports:
          - "3306:3306"
        networks:
          - name: online-judge-network

    - name: Start Redis
      community.docker.docker_container:
        name: redis
        image: redis:7
        state: started
        restart_policy: always
        ports:
          - "6379:6379"
        networks:
          - name: online-judge-network

    - name: Start RabbitMQ
      community.docker.docker_container:
        name: rabbitmq
        image: rabbitmq:3.12-management
        state: started
        restart_policy: always
        ports:
          - "5672:5672"
          - "15672:15672"
        networks:
          - name: online-judge-network

    - name: Wait for MySQL
      wait_for:
        port: 3306
        delay: 15
        timeout: 120

    - name: Wait for Redis
      wait_for:
        port: 6379
        delay: 5
        timeout: 60

    - name: Wait for RabbitMQ
      wait_for:
        port: 5672
        delay: 5
        timeout: 60

    # ---------------- SERVICE ----------------

    - name: Pull image
      community.docker.docker_image:
        name: "{{ dockerhub_username }}/{{ service_name }}"
        tag: "{{ image_tag }}"
        source: pull
        force_source: yes

    - name: Start service container
      community.docker.docker_container:
        name: "{{ service_name }}"
        image: "{{ dockerhub_username }}/{{ service_name }}:{{ image_tag }}"
        state: started
        restart: yes
        ports:
          - "{{ '3000:80' if service_name == 'online-judge-frontend'
               else service_ports[service_name] ~ ':' ~ service_ports[service_name] }}"
        networks:
          - name: online-judge-network
        env:
          SPRING_PROFILES_ACTIVE: docker

          SPRING_DATASOURCE_URL: "{{ 'jdbc:mysql://mysql:3306/online_judge' if service_name in db_services else omit }}"
          SPRING_DATASOURCE_USERNAME: "{{ 'root' if service_name in db_services else omit }}"
          SPRING_DATASOURCE_PASSWORD: "{{ 'root' if service_name in db_services else omit }}"

          SPRING_DATA_REDIS_HOST: "{{ 'redis' if service_name == 'api-gateway' else omit }}"
          SPRING_DATA_REDIS_PORT: "{{ '6379' if service_name == 'api-gateway' else omit }}"

    # ---------------- DEPENDENCY WAIT ----------------

    - name: Wait for API Gateway before frontend
      uri:
        url: "http://localhost:8090/actuator/health"
      register: gateway_health
      retries: 15
      delay: 5
      until: gateway_health.json.status == "UP"
      when: service_name == "online-judge-frontend"

    # ---------------- HEALTH CHECK ----------------

    - name: Wait for backend service to be healthy
      uri:
        url: "http://localhost:{{ service_ports[service_name] }}/actuator/health"
      register: healthcheck
      retries: 15
      delay: 5
      until: healthcheck.json.status == "UP"
      when: service_name != "online-judge-frontend"

    - name: Wait for frontend
      uri:
        url: "http://localhost:3000"
      register: frontend_check
      retries: 15
      delay: 5
      until: frontend_check.status == 200
      when: service_name == "online-judge-frontend"

    - name: Service running
      debug:
        msg: "{{ service_name }}:{{ image_tag }} is healthy"