server.port=8082
spring.application.name=worker-service

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.queue.job=job.queue
rabbitmq.queue.dlq=job.dlq
rabbitmq.exchange=job.exchange
rabbitmq.routing.key=job.routing.key

execution.timeout.seconds=10
execution.memory.limit=128m
execution.cpu.limit=0.5

spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.requested-heartbeat=60

management.endpoints.web.exposure.include=health,info