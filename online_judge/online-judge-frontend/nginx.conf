server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Proxy API calls to gateway ──────────────────────────────
    # Browser calls http://localhost:3000/submissions/...
    # nginx forwards it to http://api-gateway:8090/submissions/...
    # This works because nginx runs inside Docker and CAN resolve api-gateway
    location /submissions {
        proxy_pass http://api-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location /results {
        proxy_pass http://api-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE requires these headers
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location /admin {
        proxy_pass http://api-gateway:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # ─── SPA routing ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}