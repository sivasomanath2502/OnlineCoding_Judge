server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS — resolves service names at request time not startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy all API traffic to gateway ──────────────────────────
    # Using variable forces runtime DNS resolution via Docker DNS
    location /submissions/ {
        set $upstream http://api-gateway:8090;
        proxy_pass         $upstream/submissions/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    location /results/ {
        set $upstream http://api-gateway:8090;
        proxy_pass             $upstream/results/;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        '';
        # SSE — must disable buffering
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     310s;
        chunked_transfer_encoding on;
    }

    location /admin/ {
        set $upstream http://api-gateway:8090;
        proxy_pass         $upstream/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    location /worker/ {
        set $upstream http://api-gateway:8090;
        proxy_pass         $upstream/worker/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}