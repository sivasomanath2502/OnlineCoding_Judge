server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API routes to the gateway container
    # Docker's internal DNS resolver is at 127.0.0.11
    # Setting it here allows nginx to resolve service names at runtime
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway "http://api-gateway:8090";

    location /submissions/ {
        proxy_pass         $gateway/submissions/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /results/ {
        proxy_pass             $gateway/results/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        # SSE — disable buffering so events stream immediately
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     310s;
        proxy_set_header       Connection '';
        chunked_transfer_encoding on;
    }

    location /admin/ {
        proxy_pass         $gateway/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /worker/ {
        proxy_pass         $gateway/worker/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}