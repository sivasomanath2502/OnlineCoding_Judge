# Server
server.port=8081
spring.application.name=submission-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/online_judge
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Queue config
rabbitmq.queue.job=job.queue
rabbitmq.queue.dlq=job.dlq
rabbitmq.exchange=job.exchange
rabbitmq.routing.key=job.routing.key

# Actuator
management.endpoints.web.exposure.include=health,info