---
- name: Deploy full WeCode stack to Kubernetes
  hosts: app_servers
  connection: local
  gather_facts: yes

  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config

  vars:
    dockerhub_username: "sivasomanath2502"
    build_number: "latest"
    k8s_dir: "/opt/wecode/k8s"
    k8s_namespace: "wecode"

    clean_mysql: false

    changed_submission: "false"
    changed_worker:     "false"
    changed_result:     "false"
    changed_gateway:    "false"
    changed_admin:      "false"
    changed_auth:       "false"
    changed_frontend:   "false"

    app_services:
      - submission-service
      - result-service
      - admin-service
      - api-gateway
      - auth-service
      - wecode-frontend
      - worker-service

    service_tags:
      submission-service: "{{ build_number if changed_submission == 'true' else 'latest' }}"
      result-service:     "{{ build_number if changed_result     == 'true' else 'latest' }}"
      admin-service:      "{{ build_number if changed_admin      == 'true' else 'latest' }}"
      auth-service:       "{{ build_number if changed_auth       == 'true' else 'latest' }}"
      api-gateway:        "{{ build_number if changed_gateway    == 'true' else 'latest' }}"
      wecode-frontend:    "{{ build_number if changed_frontend   == 'true' else 'latest' }}"
      worker-service:     "{{ build_number if changed_worker     == 'true' else 'latest' }}"

  tasks:

    # ─── Step 0: Ensure hostPaths exist (Kubernetes-native approach) ──────────
    - name: Ensure HostPath directories exist on node
      shell: |
        kubectl delete job hostpath-setup -n {{ k8s_namespace }} --ignore-not-found=true
        kubectl apply -f - <<EOF
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: hostpath-setup
          namespace: {{ k8s_namespace }}
        spec:
          template:
            spec:
              containers:
              - name: setup
                image: alpine
                command: ["sh", "-c", "mkdir -p /data/mysql /data/elasticsearch && chmod 777 /data/mysql /data/elasticsearch"]
                volumeMounts:
                - name: host-data
                  mountPath: /data
              restartPolicy: Never
              volumes:
              - name: host-data
                hostPath:
                  path: /data
        EOF
        kubectl wait --for=condition=complete job/hostpath-setup -n {{ k8s_namespace }} --timeout=60s
        kubectl delete job hostpath-setup -n {{ k8s_namespace }}
      changed_when: true
      ignore_errors: yes

    # ─── Step 1: Check tools ──────────────────────────────────────────────────
    - name: Check kubectl is available
      command: kubectl version --client
      changed_when: false

    # ─── Step 2: Manifests directory ─────────────────────────────────────────
    - name: Ensure k8s manifests directory exists on Jenkins host
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy k8s manifests to Jenkins host
      copy:
        src: "../../k8s/"
        dest: "{{ k8s_dir }}/"
        mode: '0644'

    # ─── Step 3: Namespace / Config / Secrets ────────────────────────────────
    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml

    - name: Check mysql-pv phase
      command: kubectl get pv mysql-pv -o jsonpath='{.status.phase}'
      register: mysql_pv_phase
      changed_when: false
      ignore_errors: yes

    - name: Reset Released mysql-pv so it can rebind to mysql-pvc
      command: >
        kubectl patch pv mysql-pv --type=json
        -p='[{"op":"remove","path":"/spec/claimRef/uid"},{"op":"remove","path":"/spec/claimRef/resourceVersion"}]'
      when: mysql_pv_phase.stdout == "Released"

    - name: Apply ConfigMap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml

    - name: Apply Secrets (Standard)
      command: kubectl apply -f {{ k8s_dir }}/secret.yml

    - name: Check if auth-secret.yml exists
      stat:
        path: "{{ k8s_dir }}/auth-secret.yml"
      register: auth_secret_file

    - name: Apply Auth Secret (if present)
      command: kubectl apply -f {{ k8s_dir }}/auth-secret.yml
      when: auth_secret_file.stat.exists

    # ─── Step 4: Infrastructure ───────────────────────────────────────────────
    - name: Apply Infrastructure (MySQL, RabbitMQ, Redis)
      command: kubectl apply -f {{ k8s_dir }}/{{ item }}/
      loop:
        - mysql
        - rabbitmq
        - redis

    - name: Wait for Infrastructure to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app={{ item.app }}
        -n {{ k8s_namespace }} --timeout={{ item.timeout }}
      loop:
        - { app: 'mysql', timeout: '300s' }
        - { app: 'rabbitmq', timeout: '120s' }
        - { app: 'redis', timeout: '60s' }

    # ─── Step 5: ELK Stack ────────────────────────────────────────────────────
    - name: Apply ELK manifests
      command: kubectl apply -f {{ k8s_dir }}/elk/

    - name: Wait for ELK to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app={{ item.app }}
        -n {{ k8s_namespace }} --timeout=300s
      loop:
        - { app: 'elasticsearch' }
        - { app: 'logstash' }

    # ─── Step 6: Apply all app manifests ─────────────────────────────────────
    - name: Apply manifests for {{ item }}
      command: kubectl apply -f {{ k8s_dir }}/{{ item }}/
      loop: "{{ app_services }}"

    # ─── Step 7: Roll each service ONE AT A TIME ──────────────────────────────
    - name: Roll out {{ item }} sequentially
      include_tasks: tasks/roll-service.yml
      loop: "{{ app_services }}"
      loop_control:
        loop_var: service_name

    # ─── Step 8: Final status & Port Forwarding ──────────────────────────────
    - name: Get all pods status
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pods_status
      changed_when: false

    - name: Automate port-forwarding for local access
      command: bash {{ k8s_dir }}/port-forward.sh
      environment:
        BUILD_ID: "dontKillMe"
      changed_when: true

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"


    - name: Deployment complete
      debug:
        msg: "WeCode stack deployed successfully — build {{ build_number }}"