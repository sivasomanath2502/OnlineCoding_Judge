---
- name: Deploy full WeCode stack to Kubernetes
  hosts: app_servers
  connection: local
  gather_facts: yes

  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config

  vars:
    dockerhub_username: "sivasomanath2502"
    build_number: "latest"
    k8s_dir: "/opt/wecode/k8s"
    k8s_namespace: "wecode"

    clean_mysql: false

    changed_submission: "false"
    changed_worker:     "false"
    changed_result:     "false"
    changed_gateway:    "false"
    changed_admin:      "false"
    changed_frontend:   "false"

    app_services:
      - submission-service
      - result-service
      - admin-service
      - api-gateway
      - wecode-frontend
      - worker-service

    service_tags:
      submission-service: "{{ build_number if changed_submission == 'true' else 'latest' }}"
      result-service:     "{{ build_number if changed_result     == 'true' else 'latest' }}"
      admin-service:      "{{ build_number if changed_admin      == 'true' else 'latest' }}"
      api-gateway:        "{{ build_number if changed_gateway    == 'true' else 'latest' }}"
      wecode-frontend:    "{{ build_number if changed_frontend   == 'true' else 'latest' }}"
      worker-service:     "{{ build_number if changed_worker     == 'true' else 'latest' }}"

  tasks:

    # ─── Step 0: MySQL hostPath cleanup (only when clean_mysql=true) ──────────
    - name: Clean MySQL data directory (only when clean_mysql=true)
      when: clean_mysql | bool
      shell: |
        minikube ssh "sudo rm -rf /data/mysql && sudo mkdir -p /data/mysql && sudo chmod 777 /data/mysql"
      changed_when: true

    # ─── Step 0b: Elasticsearch hostPath — ensure exists, never wipe ──────────
    # Logs must persist across pipeline runs — only mkdir, never rm -rf
    - name: Ensure Elasticsearch data directory exists on host
      shell: |
        sudo mkdir -p /data/elasticsearch
        sudo chmod 777 /data/elasticsearch
      changed_when: false

    - name: Delete old mysql-hostpath-cleanup pod if it exists
      command: >
        kubectl delete pod mysql-hostpath-cleanup
        -n {{ k8s_namespace }} --ignore-not-found=true
      changed_when: false

    # ─── Step 1: Check tools ──────────────────────────────────────────────────
    - name: Check kubectl is available
      command: kubectl version --client
      changed_when: false

    # ─── Step 2: Manifests directory ─────────────────────────────────────────
    - name: Ensure k8s manifests directory exists on server
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy k8s manifests to server
      copy:
        src: "../../k8s/"
        dest: "{{ k8s_dir }}/"
        mode: '0644'

    # ─── Step 3: Namespace / Config / Secrets ────────────────────────────────
    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml

    - name: Apply ConfigMap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml

    - name: Apply Secrets
      command: kubectl apply -f {{ k8s_dir }}/secret.yml

    # ─── Step 4: Infrastructure ───────────────────────────────────────────────
    - name: Apply MySQL manifests
      command: kubectl apply -f {{ k8s_dir }}/mysql/

    - name: Apply RabbitMQ manifests
      command: kubectl apply -f {{ k8s_dir }}/rabbitmq/

    - name: Apply Redis manifests
      command: kubectl apply -f {{ k8s_dir }}/redis/

    # ─── Step 5: ELK Stack ────────────────────────────────────────────────────
    - name: Apply ELK manifests
      command: kubectl apply -f {{ k8s_dir }}/elk/

    # ─── Step 6: Wait for infrastructure ─────────────────────────────────────
    - name: Check if MySQL pod is running
      command: >
        kubectl get pods -l app=mysql -n {{ k8s_namespace }}
        --field-selector=status.phase=Running -o name
      register: mysql_pods
      changed_when: false
      ignore_errors: yes

    - name: Wait for old MySQL pod to terminate (only if not running)
      command: >
        kubectl wait pod -l app=mysql -n {{ k8s_namespace }}
        --for=delete --timeout=120s
      ignore_errors: yes
      when: mysql_pods.stdout == ""

    - name: Wait for MySQL to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=mysql
        -n {{ k8s_namespace }} --timeout=300s
      retries: 3
      delay: 15
      register: mysql_wait
      until: mysql_wait.rc == 0

    - name: Wait for RabbitMQ to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=rabbitmq
        -n {{ k8s_namespace }} --timeout=120s
      retries: 3
      delay: 10
      register: rabbitmq_wait
      until: rabbitmq_wait.rc == 0

    - name: Wait for Redis to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=redis
        -n {{ k8s_namespace }} --timeout=60s

    # ─── Step 7: Wait for ELK ────────────────────────────────────────────────
    - name: Wait for Elasticsearch to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=elasticsearch
        -n {{ k8s_namespace }} --timeout=300s
      retries: 3
      delay: 20
      register: es_wait
      until: es_wait.rc == 0

    - name: Wait for Logstash to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=logstash
        -n {{ k8s_namespace }} --timeout=300s
      retries: 3
      delay: 20
      register: ls_wait
      until: ls_wait.rc == 0

    - name: Wait for Kibana to be ready (non-blocking)
      command: >
        kubectl wait --for=condition=ready pod -l app=kibana
        -n {{ k8s_namespace }} --timeout=300s
      ignore_errors: yes

    # ─── Step 8: Apply all app manifests ─────────────────────────────────────
    - name: Apply manifests for {{ item }}
      command: kubectl apply -f {{ k8s_dir }}/{{ item }}/
      loop: "{{ app_services }}"

    # ─── Step 9: Roll each service ONE AT A TIME ──────────────────────────────
    - name: Roll out {{ item }} sequentially
      include_tasks: tasks/roll-service.yml
      loop: "{{ app_services }}"
      loop_control:
        loop_var: service_name

    # ─── Step 10: Final status ────────────────────────────────────────────────
    - name: Get all pods status
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pods_status
      changed_when: false

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"

    - name: Deployment complete
      debug:
        msg: "WeCode stack deployed successfully — build {{ build_number }}"