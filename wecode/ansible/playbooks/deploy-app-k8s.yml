---
# deploy-app-k8s.yml
#
# Full stack deploy — used ONLY when the wecode namespace does not exist yet
# (fresh cluster, deleted namespace, or first-time setup).
#
# This playbook:
#   1. Copies all k8s manifests to the server
#   2. Applies namespace, configmap, secrets
#   3. Deploys infra (mysql, rabbitmq, redis) and waits for readiness
#   4. Deploys all application services
#   5. Waits for readiness and prints status
#
- name: Full WeCode stack deploy to Kubernetes
  hosts: app_servers
  connection: local
  gather_facts: yes
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config

  vars:
    dockerhub_username: "sivasomanath2502"
    image_tag: "latest"
    k8s_dir: "/opt/wecode/k8s"
    namespace: "wecode"

  tasks:

    - name: Check kubectl is available
      command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Ensure k8s staging directory exists
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy k8s manifests to server
      copy:
        src: "../../k8s/"
        dest: "{{ k8s_dir }}/"
        mode: '0644'

    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml

    - name: Apply ConfigMap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml

    - name: Apply Secrets
      command: kubectl apply -f {{ k8s_dir }}/secret.yml

    - name: Deploy infrastructure (MySQL, RabbitMQ, Redis)
      command: "{{ item }}"
      loop:
        - kubectl apply -f {{ k8s_dir }}/mysql/
        - kubectl apply -f {{ k8s_dir }}/rabbitmq/
        - kubectl apply -f {{ k8s_dir }}/redis/

    - name: Wait for MySQL to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l app=mysql -n {{ namespace }} --timeout=120s
      retries: 3
      delay: 10

    - name: Wait for RabbitMQ to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l app=rabbitmq -n {{ namespace }} --timeout=90s

    - name: Wait for Redis to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l app=redis -n {{ namespace }} --timeout=60s

    - name: Deploy application services
      command: "{{ item }}"
      loop:
        - kubectl apply -f {{ k8s_dir }}/submission-service/
        - kubectl apply -f {{ k8s_dir }}/worker-service/
        - kubectl apply -f {{ k8s_dir }}/result-service/
        - kubectl apply -f {{ k8s_dir }}/admin-service/
        - kubectl apply -f {{ k8s_dir }}/api-gateway/
        - kubectl apply -f {{ k8s_dir }}/frontend/

    - name: Wait for API Gateway
      command: >
        kubectl wait --for=condition=ready pod
        -l app=api-gateway -n {{ namespace }} --timeout=180s
      retries: 3
      delay: 15

    - name: Wait for submission-service
      command: >
        kubectl wait --for=condition=ready pod
        -l app=submission-service -n {{ namespace }} --timeout=120s

    - name: Wait for frontend
      command: >
        kubectl wait --for=condition=ready pod
        -l app=wecode-frontend -n {{ namespace }} --timeout=60s

    - name: Get all pod statuses
      command: kubectl get pods -n {{ namespace }}
      register: pods_status

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"

    - name: Full stack deployment complete
      debug:
        msg: "WeCode full stack deployed to Kubernetes namespace '{{ namespace }}'"