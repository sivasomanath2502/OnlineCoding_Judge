---
- name: Deploy full WeCode stack to Kubernetes
  hosts: app_servers
  connection: local
  gather_facts: yes
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  vars:
    dockerhub_username: "sivasomanath2502"
    build_number: "latest"
    k8s_dir: "/opt/wecode/k8s"
    k8s_namespace: "wecode"
    # List of app services to roll in order — infrastructure first, heaviest last
    app_services:
      - submission-service
      - result-service
      - admin-service
      - api-gateway
      - wecode-frontend
      - worker-service     # worker last — heaviest pod (512Mi/1Gi), rolls after others settle

  tasks:

    - name: Check kubectl is available
      command: kubectl version --client
      changed_when: false

    - name: Ensure k8s manifests directory exists on server
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy k8s manifests to server
      copy:
        src: "../../k8s/"
        dest: "{{ k8s_dir }}/"
        mode: '0644'

    # ─── Namespace / Config / Secrets ────────────────────────────────────────
    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml

    - name: Apply ConfigMap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml

    - name: Apply Secrets
      command: kubectl apply -f {{ k8s_dir }}/secret.yml

    # ─── Infrastructure ───────────────────────────────────────────────────────
    - name: Apply MySQL manifests
      command: kubectl apply -f {{ k8s_dir }}/mysql/

    - name: Apply RabbitMQ manifests
      command: kubectl apply -f {{ k8s_dir }}/rabbitmq/

    - name: Apply Redis manifests
      command: kubectl apply -f {{ k8s_dir }}/redis/

    # ─── Wait for infrastructure ──────────────────────────────────────────────
    # FIX: Only wait for delete if MySQL is ACTUALLY being recreated.
    # Check if any pod is in Terminating state first — skip the wait entirely
    # if there's nothing terminating. This eliminates the 2-minute timeout waste.
    - name: Check if MySQL pod is terminating
      command: >
        kubectl get pods -l app=mysql -n {{ k8s_namespace }}
        --field-selector=status.phase=Running -o name
      register: mysql_pods
      changed_when: false
      ignore_errors: yes

    - name: Wait for old MySQL pod to terminate (only if pod count is wrong)
      command: >
        kubectl wait pod -l app=mysql -n {{ k8s_namespace }}
        --for=delete --timeout=120s
      ignore_errors: yes
      when: mysql_pods.stdout == ""

    - name: Wait for MySQL to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=mysql
        -n {{ k8s_namespace }} --timeout=300s
      retries: 3
      delay: 15
      register: mysql_wait
      until: mysql_wait.rc == 0

    - name: Wait for RabbitMQ to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=rabbitmq
        -n {{ k8s_namespace }} --timeout=120s
      retries: 3
      delay: 10
      register: rabbitmq_wait
      until: rabbitmq_wait.rc == 0

    - name: Wait for Redis to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=redis
        -n {{ k8s_namespace }} --timeout=60s

    # ─── Application services — ONE AT A TIME ─────────────────────────────────
    # FIX: Apply + set image + wait are now a single loop per service.
    # Only ONE service rolls at a time — no resource contention, no timeout races.

    - name: Apply manifests for {{ item }}
      command: kubectl apply -f {{ k8s_dir }}/{{ item }}/
      loop: "{{ app_services }}"

    - name: Update image tag and wait for rollout — {{ item }}
      block:
        - name: Set image — {{ item }}
          command: >
            kubectl set image deployment/{{ item }}
            {{ item }}={{ dockerhub_username }}/{{ item }}:{{ build_number }}
            -n {{ k8s_namespace }}

        - name: Wait for rollout — {{ item }}
          command: >
            kubectl rollout status deployment/{{ item }}
            -n {{ k8s_namespace }} --timeout=600s
          register: rollout_result

        - name: Rollback — {{ item }}
          command: kubectl rollout undo deployment/{{ item }} -n {{ k8s_namespace }}
          when: rollout_result.rc != 0

        - name: Fail pipeline if rollout failed — {{ item }}
          fail:
            msg: "Rollout failed for {{ item }} — rolled back"
          when: rollout_result.rc != 0

      loop: "{{ app_services }}"

    # ─── Final status ─────────────────────────────────────────────────────────
    - name: Get all pods status
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pods_status
      changed_when: false

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"

    - name: Deployment complete
      debug:
        msg: "WeCode stack deployed successfully — build {{ build_number }}"