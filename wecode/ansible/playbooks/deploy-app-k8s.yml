---
- name: Deploy full WeCode stack to Kubernetes
  hosts: app_servers
  connection: local
  gather_facts: yes
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  vars:
    dockerhub_username: "sivasomanath2502"
    build_number: "latest"
    k8s_dir: "/opt/wecode/k8s"
    k8s_namespace: "wecode"
    app_services:
      - submission-service
      - result-service
      - admin-service
      - api-gateway
      - wecode-frontend
      - worker-service

  tasks:

    # ─── Step 0: Ensure namespace exists first ────────────────────────────────
    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml
      ignore_errors: yes

    # ─── Step 1: Clean MySQL hostPath via a manifest-based pod ───────────────
    - name: Delete any existing MySQL cleanup pod (idempotent)
      command: >
        kubectl delete pod mysql-hostpath-cleanup
        -n {{ k8s_namespace }} --ignore-not-found=true
      changed_when: false

    - name: Copy MySQL cleanup pod manifest to server
      copy:
        src: "templates/mysql-cleanup-pod.yml"
        dest: "/tmp/mysql-cleanup-pod.yml"
        mode: '0644'

    - name: Run MySQL hostPath cleanup pod
      command: kubectl apply -f /tmp/mysql-cleanup-pod.yml

    - name: Wait for cleanup pod to complete
      shell: |
        for i in $(seq 1 30); do
          PHASE=$(kubectl get pod mysql-hostpath-cleanup -n {{ k8s_namespace }} \
                  -o jsonpath='{.status.phase}' 2>/dev/null)
          echo "Attempt $i: phase=$PHASE"
          if [ "$PHASE" = "Succeeded" ]; then
            echo "Cleanup pod completed successfully"
            exit 0
          fi
          if [ "$PHASE" = "Failed" ]; then
            echo "Cleanup pod failed"
            exit 1
          fi
          sleep 2
        done
        echo "Timed out waiting for cleanup pod"
        exit 1

    - name: Delete cleanup pod
      command: >
        kubectl delete pod mysql-hostpath-cleanup
        -n {{ k8s_namespace }} --ignore-not-found=true
      changed_when: false

    # ─── Step 2: Check tools ──────────────────────────────────────────────────
    - name: Check kubectl is available
      command: kubectl version --client
      changed_when: false

    # ─── Step 3: Manifests directory ─────────────────────────────────────────
    - name: Ensure k8s manifests directory exists on server
      file:
        path: "{{ k8s_dir }}"
        state: directory
        mode: '0755'

    - name: Copy k8s manifests to server
      copy:
        src: "../../k8s/"
        dest: "{{ k8s_dir }}/"
        mode: '0644'

    # ─── Step 4: Config / Secrets ─────────────────────────────────────────────
    - name: Apply namespace
      command: kubectl apply -f {{ k8s_dir }}/namespace.yml

    - name: Apply ConfigMap
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml

    - name: Apply Secrets
      command: kubectl apply -f {{ k8s_dir }}/secret.yml

    # ─── Step 5: Infrastructure ───────────────────────────────────────────────
    - name: Apply MySQL manifests
      command: kubectl apply -f {{ k8s_dir }}/mysql/

    - name: Apply RabbitMQ manifests
      command: kubectl apply -f {{ k8s_dir }}/rabbitmq/

    - name: Apply Redis manifests
      command: kubectl apply -f {{ k8s_dir }}/redis/

    # ─── Step 6: Wait for infrastructure ─────────────────────────────────────
    - name: Check if MySQL pod is running
      command: >
        kubectl get pods -l app=mysql -n {{ k8s_namespace }}
        --field-selector=status.phase=Running -o name
      register: mysql_pods
      changed_when: false
      ignore_errors: yes

    - name: Wait for old MySQL pod to terminate (only if not running)
      command: >
        kubectl wait pod -l app=mysql -n {{ k8s_namespace }}
        --for=delete --timeout=120s
      ignore_errors: yes
      when: mysql_pods.stdout == ""

    - name: Wait for MySQL to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=mysql
        -n {{ k8s_namespace }} --timeout=300s
      retries: 3
      delay: 15
      register: mysql_wait
      until: mysql_wait.rc == 0

    - name: Wait for RabbitMQ to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=rabbitmq
        -n {{ k8s_namespace }} --timeout=120s
      retries: 3
      delay: 10
      register: rabbitmq_wait
      until: rabbitmq_wait.rc == 0

    - name: Wait for Redis to be ready
      command: >
        kubectl wait --for=condition=ready pod -l app=redis
        -n {{ k8s_namespace }} --timeout=60s

    # ─── Step 7: Apply all app manifests ─────────────────────────────────────
    - name: Apply manifests for {{ item }}
      command: kubectl apply -f {{ k8s_dir }}/{{ item }}/
      loop: "{{ app_services }}"

    # ─── Step 8: Roll each service ONE AT A TIME ──────────────────────────────
    - name: Roll out {{ item }} sequentially
      include_tasks: tasks/roll-service.yml
      loop: "{{ app_services }}"
      loop_control:
        loop_var: service_name

    # ─── Step 9: Final status ─────────────────────────────────────────────────
    - name: Get all pods status
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pods_status
      changed_when: false

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"

    - name: Deployment complete
      debug:
        msg: "WeCode stack deployed successfully — build {{ build_number }}"