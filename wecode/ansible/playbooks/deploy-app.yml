---
- name: Deploy full Online Judge stack
  hosts: app_servers
  become: yes

  vars:
    dockerhub_username: "sivasomanath2502"
    image_tag: "latest"
    app_dir: "/opt/wecode"

  tasks:

    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy docker-compose file to server
      copy:
        src: "../../docker-compose.prod.yml"
        dest: "{{ app_dir }}/docker-compose.prod.yml"
        mode: '0644'

    - name: Pull latest images for all services
      shell: |
        docker-compose -f docker-compose.prod.yml pull
      args:
        chdir: "{{ app_dir }}"
      environment:
        IMAGE_TAG: "{{ image_tag }}"
        DOCKERHUB_USERNAME: "{{ dockerhub_username }}"

    - name: Bring up full stack
      shell: |
        docker-compose -f docker-compose.prod.yml up -d --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      environment:
        IMAGE_TAG: "{{ image_tag }}"
        DOCKERHUB_USERNAME: "{{ dockerhub_username }}"

    - name: Wait for API Gateway to be ready
      wait_for:
        host: localhost
        port: 8090
        delay: 20
        timeout: 180

    - name: Wait for services to initialise
      pause:
        seconds: 30

    - name: Health check — API Gateway
      uri:
        url: http://localhost:8090/actuator/health
        status_code: 200
      register: health_check
      retries: 10
      delay: 15
      until: health_check.status == 200

    - name: Show health status
      debug:
        msg: "Full stack is UP — {{ health_check.json.status }}"