---
# selective-rollout-k8s.yml
#
# Called by the root pipeline when the wecode namespace already exists.
#
# Behaviour matrix:
#   service rebuilt  → kubectl set image  (triggers rolling update with new image)
#   service not rebuilt → kubectl rollout restart  (re-schedules any deleted pods)
#   infrastructure (mysql/rabbitmq/redis) → always re-applied (handles config drift)
#
# Required vars (passed from root Jenkinsfile):
#   dockerhub_username, image_tag
#   build_submission, build_worker, build_result,
#   build_gateway, build_admin, build_frontend
#   (each is the string 'true' or 'false')
#
- name: Selective rollout to existing Kubernetes cluster
  hosts: app_servers
  connection: local
  gather_facts: no
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config

  vars:
    namespace: "wecode"
    services:
      - name: submission-service
        flag: "{{ build_submission }}"
      - name: worker-service
        flag: "{{ build_worker }}"
      - name: result-service
        flag: "{{ build_result }}"
      - name: api-gateway
        flag: "{{ build_gateway }}"
      - name: admin-service
        flag: "{{ build_admin }}"
      - name: wecode-frontend
        flag: "{{ build_frontend }}"

  tasks:

    # ── Always re-apply infra manifests so config drift is caught ────────
    - name: Re-apply ConfigMap (picks up any env var changes)
      command: kubectl apply -f {{ k8s_dir }}/configmap.yml
      vars:
        k8s_dir: /opt/wecode/k8s

    - name: Re-apply Secrets
      command: kubectl apply -f {{ k8s_dir }}/secret.yml
      vars:
        k8s_dir: /opt/wecode/k8s

    # ── For each rebuilt service: set image (rolling update) ─────────────
    - name: "Rolling update — {{ item.name }}"
      command: >
        kubectl set image deployment/{{ item.name }}
        {{ item.name }}={{ dockerhub_username }}/{{ item.name }}:{{ image_tag }}
        -n {{ namespace }}
      loop: "{{ services }}"
      when: item.flag == 'true'

    # ── For each unchanged service: restart to recover any deleted pods ───
    # This is the key fix for "I deleted the namespace and recreated it" —
    # images are already in the registry so we just restart the deployments.
    - name: "Restart unchanged deployment — {{ item.name }}"
      command: >
        kubectl rollout restart deployment/{{ item.name }}
        -n {{ namespace }}
      loop: "{{ services }}"
      when: item.flag == 'false'
      ignore_errors: yes     # if a deployment doesn't exist yet, don't fail

    # ── Wait for all deployments to finish rolling ────────────────────────
    - name: "Wait for rollout — {{ item.name }}"
      command: >
        kubectl rollout status deployment/{{ item.name }}
        -n {{ namespace }} --timeout=180s
      loop: "{{ services }}"
      register: rollout_results
      ignore_errors: yes

    - name: Show rollout results
      debug:
        msg: "{{ item.item.name }}: {{ item.stdout | default('no output') }}"
      loop: "{{ rollout_results.results }}"

    - name: Get final pod status
      command: kubectl get pods -n {{ namespace }}
      register: pods_status

    - name: Show pod status
      debug:
        msg: "{{ pods_status.stdout_lines }}"