---
# tasks/roll-service.yml
# Rolls out a single service. Called in a loop from deploy-app-k8s.yml.
# Uses service_tags[service_name] to resolve the correct image tag:
#   - If the service was rebuilt this run → versioned tag (build_number)
#   - If the service was NOT rebuilt      → 'latest' (avoids ImagePullBackOff)

- name: "[{{ service_name }}] Set image"
  command: >
    kubectl set image deployment/{{ service_name }}
    {{ service_name }}={{ dockerhub_username }}/{{ service_name }}:{{ service_tags[service_name] }}
    -n {{ k8s_namespace }}

- name: "[{{ service_name }}] Force pod restart to pull latest image"
  command: >
    kubectl rollout restart deployment/{{ service_name }}
    -n {{ k8s_namespace }}

- name: "[{{ service_name }}] Wait for rollout"
  command: >
    kubectl rollout status deployment/{{ service_name }}
    -n {{ k8s_namespace }} --timeout=600s
  register: rollout_result
  failed_when: false

- name: "[{{ service_name }}] Rollback on failure"
  command: kubectl rollout undo deployment/{{ service_name }} -n {{ k8s_namespace }}
  when: rollout_result.rc != 0

- name: "[{{ service_name }}] Fail pipeline after rollback"
  fail:
    msg: "Rollout failed for {{ service_name }} — rolled back to previous version"
  when: rollout_result.rc != 0