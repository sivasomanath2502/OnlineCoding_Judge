apiVersion: v1
kind: Pod
metadata:
  name: mysql-hostpath-cleanup
  namespace: wecode
spec:
  restartPolicy: Never
  containers:
    - name: cleanup
      image: busybox:1.36
      command:
        - sh
        - -c
        - "rm -rf /data/mysql && mkdir -p /data/mysql && echo 'MySQL hostPath cleaned'"
      volumeMounts:
        - name: mysql-data
          mountPath: /data/mysql
  volumes:
    - name: mysql-data
      hostPath:
        path: /data/mysql