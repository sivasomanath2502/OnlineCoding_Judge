apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wecode
spec:
  replicas: 2
  # FIX 1: maxSurge: 0 prevents a 3rd pod being created during rollout.
  # Without this, K8s tries to bring up a new pod BEFORE killing old ones,
  # which exhausts node resources and causes the 180s rollout timeout failure.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1     # Never create extra pods beyond replica count
      maxUnavailable: 0 # Kill one old pod first, then replace it
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: sivasomanath2502/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: wecode-config
            - secretRef:
                name: wecode-secret
          env:
            - name: SERVER_PORT
              value: "8090"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            # FIX 2: Increased from 10s to 30s — JVM needs more warmup time
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"