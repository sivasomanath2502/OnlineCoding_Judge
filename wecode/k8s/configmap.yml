apiVersion: v1
kind: ConfigMap
metadata:
  name: wecode-config
  namespace: wecode
data:
  # Database
  MYSQL_DATABASE:         "wecode"
  SPRING_DATASOURCE_URL:  "jdbc:mysql://mysql:3306/wecode?useSSL=false&allowPublicKeyRetrieval=true"
  SPRING_JPA_DDL_AUTO:    "update"

  # RabbitMQ
  SPRING_RABBITMQ_HOST:   "rabbitmq"
  SPRING_RABBITMQ_PORT:   "5672"

  # Redis
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"

  # Service URLs
  RESULT_SERVICE_URL:     "http://result-service:8083"
  SUBMISSION_SERVICE_URL: "http://submission-service:8081"
  ADMIN_SERVICE_URL:      "http://admin-service:8084"

  # RabbitMQ queue config
  RABBITMQ_QUEUE_JOB:     "job.queue"
  RABBITMQ_QUEUE_DLQ:     "job.dlq"
  RABBITMQ_EXCHANGE:      "job.exchange"
  RABBITMQ_ROUTING_KEY:   "job.routing.key"

  # Execution config
  EXECUTION_TIMEOUT_SECONDS: "10"
  EXECUTION_MEMORY_LIMIT:    "128m"
  EXECUTION_CPU_LIMIT:       "0.5"
  EXECUTION_TEMP_DIR:        "/judge-tmp"
  EXECUTION_HOST_TEMP_DIR:   "/tmp/judge"

  # Spring profiles
  SPRING_PROFILES_ACTIVE: "docker"