apiVersion: apps/v1
kind: Deployment
metadata:
  name: wecode-frontend
  namespace: wecode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wecode-frontend
  template:
    metadata:
      labels:
        app: wecode-frontend
    spec:
      containers:
        - name: wecode-frontend
          image: sivasomanath2502/wecode-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-conf