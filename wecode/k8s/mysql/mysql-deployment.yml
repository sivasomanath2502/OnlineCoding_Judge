apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: wecode
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          args:
            - --innodb-buffer-pool-size=128M
            - --innodb-log-file-size=32M
            - --max-connections=200
            - --performance-schema=OFF
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wecode-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: wecode-config
                  key: MYSQL_DATABASE
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          startupProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - -proot
                - --protocol=TCP
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - -proot
                - --protocol=TCP
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - -proot
                - --protocol=TCP
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc