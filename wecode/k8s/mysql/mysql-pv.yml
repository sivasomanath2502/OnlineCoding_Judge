---
# mysql-pv.yml
# BUG FIX: Added PersistentVolume with Retain policy.
# Without PV, PVC stays Pending on Minikube with no storageClass defined.
# Retain policy ensures data survives namespace deletion.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/mysql    # stored on minikube node filesystem
