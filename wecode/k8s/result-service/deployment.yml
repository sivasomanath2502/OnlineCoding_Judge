apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-service
  namespace: wecode
spec:
  replicas: 2
  # FIX 1: maxSurge: 0 prevents a 3rd pod being created during rollout.
  # Without this, K8s tries to bring up a new pod BEFORE killing old ones,
  # which exhausts node resources and causes the 180s rollout timeout failure.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # Never create extra pods beyond replica count
      maxUnavailable: 1  # Kill one old pod first, then replace it
  selector:
    matchLabels:
      app: result-service
  template:
    metadata:
      labels:
        app: result-service
    spec:
      containers:
        - name: result-service
          image: sivasomanath2502/result-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: wecode-config
            - secretRef:
                name: wecode-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            # FIX 2: Increased from 10s to 30s — JVM needs more warmup time
            # before it can reliably serve the health endpoint
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"