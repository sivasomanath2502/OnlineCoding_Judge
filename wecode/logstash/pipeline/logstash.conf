input {
  # Spring Boot services send JSON logs to TCP port 5000
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse the Spring Boot log structure
  if [level] {
    mutate {
      # Normalize log level field names
      rename => { "level" => "log_level" }
      rename => { "message" => "log_message" }
    }
  }

  # Add a timestamp if missing
  if ![@timestamp] {
    mutate {
      add_field => { "@timestamp" => "%{timestamp}" }
    }
  }

  # Tag verdict events — useful for dashboards
  if [log_message] =~ /verdict/ {
    mutate {
      add_tag => ["verdict_event"]
    }
  }

  # Tag submission events
  if [log_message] =~ /submissionId/ {
    mutate {
      add_tag => ["submission_event"]
    }
  }

  # Tag errors
  if [log_level] == "ERROR" {
    mutate {
      add_tag => ["error_event"]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # One index per service per day
    index => "wecode-%{[service_name]}-%{+YYYY.MM.dd}"
  }

  # Also print to Logstash console for debugging
  stdout {
    codec => rubydebug
  }
}