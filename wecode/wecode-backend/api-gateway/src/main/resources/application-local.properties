spring.cloud.gateway.routes[0].id=submission-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/submissions/**

spring.cloud.gateway.routes[1].id=result-service
spring.cloud.gateway.routes[1].uri=http://localhost:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/results/**

spring.cloud.gateway.routes[2].id=worker-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/worker/**

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=*

spring.data.redis.host=localhost

spring.cloud.gateway.httpclient.response-timeout=300000
spring.cloud.gateway.httpclient.connect-timeout=5000

submission.service.url=http://localhost:8081
result.service.url=http://localhost:8083
admin.service.url=http://localhost:8084
auth.service.url=http://localhost:8085
jwt.secret=REPLACE_WITH_REAL_VALUE