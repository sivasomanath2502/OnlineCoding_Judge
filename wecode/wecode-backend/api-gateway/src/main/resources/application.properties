server.port=8090
spring.application.name=api-gateway

spring.data.redis.port=6379

management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.onlinejudge.api_gateway=DEBUG

# ─── Global CORS Configuration ─────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=*
