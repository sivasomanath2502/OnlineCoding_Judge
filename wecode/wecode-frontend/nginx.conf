server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Docker internal DNS resolver ──────────────────────────────
    # 127.0.0.11 is Docker's built-in DNS server
    # valid=30s means re-resolve every 30 seconds
    # This makes nginx resolve api-gateway lazily (per request)
    # so nginx starts successfully even if api-gateway is not up yet
    resolver 127.0.0.11 valid=30s;
    set $gateway http://api-gateway:8090;

    location /submissions {
        proxy_pass $gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location /results {
        proxy_pass $gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cache-Control no-cache;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location /admin {
        proxy_pass $gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}